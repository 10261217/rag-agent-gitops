apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: milvus
  namespace: argocd
spec:
  project: default
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: milvus

  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
    - CreateNamespace=true
  sources:
    - repoURL: 'https://zilliztech.github.io/milvus-helm/'
      chart: milvus
      targetRevision: 4.1.22
      helm:
        values: |
          service:
            type: NodePort
          cluster:
            enabled: false
          pulsar:
            enabled: false

          etcd:
            persistence:
              storageClass: "openebs-hostpath-retain"
              size: 10Gi

          minio:
            persistence:
              storageClass: "openebs-hostpath-retain"
              size: 20Gi

          standalone:
            persistence:
              storageClass: "openebs-hostpath-retain"
              size: 30Gi
            resources:
              requests:
                cpu: "500m"
                memory: "1Gi"
              limits:
                cpu: "1"
                memory: "2Gi"

