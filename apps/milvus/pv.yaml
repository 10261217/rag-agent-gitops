apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: milvus-etcd-pvc
  namespace: milvus  # 将PVC也放入ai-services命名空间
spec:
  accessModes: #卷可以被单个节点以读写方式挂载，避免并发写入导致数据损坏或状态不一致
    - ReadWriteOnce
  storageClassName: openebs-hostpath-retain
  resources:
    requests:
      storage: 10Gi

---
# --- 为minio创建PV ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: milvus-minio-pvc
  namespace: milvus
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: openebs-hostpath-retain
  resources:
    requests:
      storage: 20Gi
---
# --- 为standalone组件创建PV ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: milvus-standalone-pvc
  namespace: milvus
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: openebs-hostpath-retain
  resources:
    requests:
      storage: 50Gi

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: milvus
  namespace: argocd
spec:
  project: default
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: milvus

  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
    - CreateNamespace=true
  sources:
    - repoURL: 'https://github.com/10261217/rag-agent-gitops'
      targetRevision: HEAD
      path: apps/milvus

    - repoURL: 'https://zilliztech.github.io/milvus-helm/'
      chart: milvus
      targetRevision: 4.1.22
      helm:
        values: |
          service:
            type: NodePort
          cluster:
            enabled: false
          pulsar:
            enabled: false

          etcd:
            persistence:
              existingClaim: milvus-etcd-pvc

          minio:
            persistence:
              existingClaim: milvus-minio-pvc

          standalone:
            persistence:
              existingClaim: milvus-standalone-pvc
            resources:
              requests:
                cpu: "500m"
                memory: "1Gi"
              limits:
                cpu: "1"
                memory: "2Gi"
